name: Test, tag and publish

on:
  push:
    branches: [master]

permissions:
  contents: write
  id-token: write

jobs:
  test-tag-publish:
    name: Test, tag and publish
    runs-on: ubuntu-latest
    steps:
      - name: Get secrets
        uses: Infisical/secrets-action@v1.0.16
        with:
          method: "oidc"
          identity-id: "a8dda831-0ca0-4ddb-bd07-15ccb8d10396"
          project-slug: "publish"
          env-slug: "prod"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        env:
          GITHUB_APP_CREATE_TAGS_CLIENT_ID: ${{ env.GITHUB_APP_CREATE_TAGS_CLIENT_ID }}
          GITHUB_APP_CREATE_TAGS_PRIVATE_KEY: ${{ env.GITHUB_APP_CREATE_TAGS_PRIVATE_KEY }}
        with:
          client-id: ${{ env.GITHUB_APP_CREATE_TAGS_CLIENT_ID }}
          private-key: ${{ env.GITHUB_APP_CREATE_TAGS_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-tags: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Run checks
        run: |
          cargo fmt --check
          cargo clippy
          cargo test

      - name: Get version, check if tag exists, create and publish if not
        run: |
          VERSION=$(cargo pkgid | rev | cut -d '@' -f 1 | cut -d '#' -f 1 | rev)
          TAG="v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists"
          else
            cargo publish
            echo "Creating tag ${TAG}"
            git config user.name "github-actions[bot]"
            git config user.email 'CreateTags[bot]@users.noreply.github.com'
            git tag "${TAG}"
            git push origin "${TAG}"
          fi
